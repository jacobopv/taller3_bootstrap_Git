                            <a class="nav-link" href="#"><i class="bi bi-trophy-fill"></i> Campeonatos</a>
                        </li>
                        <li class="nav-item fs-5 px-2">
                            <a class="nav-link" href="#"><i class="bi bi-person-fill"></i> Jugadores</a>
                        </li>
                        <li class="nav-item dropdown fs-5 px-2">
                            <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                <i class="bi bi-calendar"></i> Proyectos
                            </a>
                            <ul class="dropdown-menu dropdown-menu-dark border-warning" aria-labelledby="navbarDropdown">
                                <li><a class="dropdown-item" href="table.html"><i class="bi bi-table me-2"></i>Tables</a></li>
                                <li><a class="dropdown-item" href="git.html"><i class="bi bi-github me-2"></i>Git</a></li>

                            </ul>

                    </ul>
                </div>
            </div>
            <button type="button" class="btn btn-warning btn-sm fw-bold me-3 text-black"
                style="--bs-btn-padding-y:.3rem;--bs-btn-padding-x:.9rem;">
                <i class="bi bi-tv"></i> Ver NBA en vivo
            </button>
        </nav>

    <main class="container my-5">
        <div class="row g-4 justify-content-center align-items-stretch">
            
            <div class="col-12 col-md-6 col-lg-5">
                <div class="card h-100 border-0 bg-white text-dark p-4 rounded-4 shadow-sm">
                    <div class="card-body">
                        <div class="d-flex align-items-center gap-3 mb-4">
                            <span class="p-2 bg-primary-subtle text-primary rounded-3 fs-3 d-inline-flex">
                                <i class="bi bi-person-plus-fill"></i>
                            </span>
                            <h2 class="card-title h3 fw-bold mb-0 text-secondary">Registro</h2>
                        </div>
                        <form>
                            <div class="mb-3 text-start">
                                <label class="form-label fw-semibold text-secondary small">Nombre</label>
                                <input type="text" class="form-control form-control-lg bg-light border-0 rounded-3">
                            </div>
                            <div class="mb-3 text-start">
                                <label class="form-label fw-semibold text-secondary small">Apellido</label>
                                <input type="text" class="form-control form-control-lg bg-light border-0 rounded-3">
                            </div>
                            <div class="mb-3 text-start">
                                <label class="form-label fw-semibold text-secondary small">Correo</label>
                                <input type="email" class="form-control form-control-lg bg-light border-0 rounded-3">
                            </div>
                            <div class="mb-4 text-start">
                                <label class="form-label fw-semibold text-secondary small">Contraseña</label>
                                <input type="password" class="form-control form-control-lg bg-light border-0 rounded-3">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold fs-5 rounded-3">Registrarse</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-5">
                <div class="card h-100 border-0 bg-white text-dark p-4 rounded-4 shadow-sm">
                    <div class="card-body">
                        <div class="d-flex align-items-center gap-3 mb-4">
                            <span class="p-2 bg-success-subtle text-success rounded-3 fs-3 d-inline-flex">
                                <i class="bi bi-shield-lock-fill"></i>
                            </span>
                            <h2 class="card-title h3 fw-bold mb-0 text-secondary">Inicio Sesión</h2>
                        </div>
                        <form>
                            <div class="mb-3 text-start">
                                <label class="form-label fw-semibold text-secondary small">Email</label>
                                <input type="email" class="form-control form-control-lg bg-light border-0 rounded-3">
                            </div>
                            <div class="mb-3 text-start">
                                <label class="form-label fw-semibold text-secondary small">Password</label>
                                <input type="password" class="form-control form-control-lg bg-light border-0 rounded-3">
                            </div>
                            <div class="form-check mb-4 text-start d-flex align-items-center gap-2">
                                <input class="form-check-input border-secondary-subtle" type="checkbox" id="recordarmeCheck">
                                <label class="form-check-label text-secondary small" for="recordarmeCheck">
                                    Recordarme
                                </label>
                            </div>
                            <button type="submit" class="btn btn-dark w-100 py-2 fw-bold fs-5 rounded-3 bg-black border-0">Iniciar sesión</button>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="bg-black text-light py-4 mt-5 border-top border-warning border-3">

            <div class="text-center pt-2">
                <p class="mb-1 text-light fw-medium">
                    Desarrollado por: <span class="text-warning">Jacobo Paniagua</span>
